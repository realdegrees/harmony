user nginx;
worker_processes 1;
error_log /var/log/nginx/error.log debug;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format dev '$remote_addr "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log dev;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    # Generous upload limit for development
    client_max_body_size 100M;

    # ── Upstream: App Server (Bun) ────────────────────────────────────────────
    upstream harmony_app {
        server harmony-app:3000;
        keepalive 16;
    }

    # ── Upstream: Vite Dev Server (SvelteKit HMR) ─────────────────────────────
    upstream harmony_frontend {
        server harmony-frontend:5173;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # ── WebSocket: App Server WebSocket (/ws) ─────────────────────────────
        location /ws {
            proxy_pass http://harmony_app;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # No timeouts for long-lived WebSocket connections in dev
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_connect_timeout 10s;
            proxy_buffering off;
        }

        # ── API Proxy (/api/*) ────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://harmony_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 10s;

            # No caching in dev
            add_header Cache-Control "no-store" always;
        }

        # ── Vite HMR WebSocket (/@vite/client, /__vite_hmr) ──────────────────
        location ~* ^/(@vite|__vite_hmr|@sveltejs|node_modules) {
            proxy_pass http://harmony_frontend;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering off;
        }

        # ── All other traffic → Vite dev server ──────────────────────────────
        # Vite handles SvelteKit HMR, SSR, and static assets in development
        location / {
            proxy_pass http://harmony_frontend;
            proxy_http_version 1.1;

            # Allow WebSocket upgrade for Vite HMR
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $http_connection;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_connect_timeout 10s;
            proxy_buffering off;
        }
    }
}
