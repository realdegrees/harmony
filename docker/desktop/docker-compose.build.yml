name: harmony-desktop-build

services:
  build:
    build:
      context: ../..
      dockerfile: docker/desktop/Dockerfile
    volumes:
      # Mount the entire repo so the build script can see all packages
      - ../..:/workspace
      # Persist the Cargo registry and compiled crates across builds —
      # without this, Rust redownloads and recompiles everything every run
      - cargo-registry:/root/.cargo/registry
      - cargo-git:/root/.cargo/git
      # Persist the Rust build target directory (the biggest cache win)
      # Using a named volume keeps it out of the repo but alive between runs
      - rust-target:/workspace/desktop/src-tauri/target
    # Output artifacts land in ./dist/desktop/ on your host
    working_dir: /workspace

volumes:
  cargo-registry:
    name: harmony-cargo-registry
  cargo-git:
    name: harmony-cargo-git
  rust-target:
    name: harmony-rust-target
