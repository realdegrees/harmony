name: harmony-dev

services:
  # ── App Server (Bun - hot reload via --hot) ───────────────────────────────────
  harmony-app:
    build:
      context: ..
      dockerfile: docker/app.dev/Dockerfile
    env_file: ../.env
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      # Mount source directories for hot reload
      - ../backend:/app/backend
      - ../shared:/app/shared:ro
      # Persist node_modules inside the container (not overwritten by host mount)
      - app_node_modules:/app/node_modules
      - backend_node_modules:/app/backend/node_modules
      # Uploads persist across restarts
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - harmony-dev-net

  # ── Frontend Dev Server (Vite / SvelteKit HMR) ───────────────────────────────
  harmony-frontend:
    build:
      context: ..
      dockerfile: docker/app.dev/Dockerfile
    env_file: ../.env
    environment:
      NODE_ENV: development
      # Tell Vite to listen on all interfaces inside the container
      HOST: 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app/frontend
      - ../shared:/app/shared:ro
      - frontend_node_modules:/app/frontend/node_modules
      - app_node_modules:/app/node_modules
    command: ["bun", "--filter", "@harmony/frontend", "dev", "--host", "0.0.0.0"]
    restart: unless-stopped
    networks:
      - harmony-dev-net

  # ── Media Server (Node.js + mediasoup) ───────────────────────────────────────
  harmony-media:
    build:
      context: ..
      dockerfile: docker/media/Dockerfile
    env_file: ../.env
    environment:
      NODE_ENV: development
    ports:
      - "3001:3001"
      - "${MEDIASOUP_RTC_MIN_PORT:-40000}-${MEDIASOUP_RTC_MAX_PORT:-40100}:${MEDIASOUP_RTC_MIN_PORT:-40000}-${MEDIASOUP_RTC_MAX_PORT:-40100}/udp"
      - "${MEDIASOUP_RTC_MIN_PORT:-40000}-${MEDIASOUP_RTC_MAX_PORT:-40100}:${MEDIASOUP_RTC_MIN_PORT:-40000}-${MEDIASOUP_RTC_MAX_PORT:-40100}/tcp"
    volumes:
      # Mount source for hot reload (requires nodemon/tsx --watch or similar)
      - ../media/src:/app/src
    restart: unless-stopped
    networks:
      - harmony-dev-net

  # ── PostgreSQL 16 (host port exposed for local tooling) ───────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: harmony
      POSTGRES_USER: harmony
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-harmony}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harmony -d harmony"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - harmony-dev-net

  # ── Redis 7 (host port exposed for local tooling) ─────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --loglevel verbose
    ports:
      - "6379:6379"
    volumes:
      - redisdata_dev:/data
    restart: unless-stopped
    networks:
      - harmony-dev-net

  # ── nginx (routes /api and /ws to app, everything else to Vite) ───────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - harmony-app
      - harmony-frontend
    restart: unless-stopped
    networks:
      - harmony-dev-net

# ── Named Volumes ─────────────────────────────────────────────────────────────
volumes:
  pgdata_dev:
  redisdata_dev:
  uploads:
  # Anonymous volumes to preserve container node_modules
  app_node_modules:
  backend_node_modules:
  frontend_node_modules:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  harmony-dev-net:
    driver: bridge
