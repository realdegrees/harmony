name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/harmony

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            shared/node_modules
            backend/node_modules
            frontend/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock', '**/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linters
        run: bun run lint

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag=${{ env.IMAGE }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/app/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            IMAGE="${{ env.IMAGE }}"
            TAG="${{ steps.meta.outputs.short_sha }}"

            echo "==> Deploying harmony:${TAG} to ${DEPLOY_PATH}"
            cd "${DEPLOY_PATH}"

            # Pull the new image
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull "${IMAGE}:${TAG}"

            # Update compose to use this exact tag
            export HARMONY_IMAGE="${IMAGE}:${TAG}"

            # Run migrations before swapping the container
            echo "==> Running migrations..."
            docker run --rm \
              --env-file .env \
              -v harmony_data:/data \
              "${IMAGE}:${TAG}" \
              sh -c "cd /app/backend && bunx prisma migrate deploy"

            # Restart with the new image
            echo "==> Restarting..."
            docker compose -f docker/docker-compose.yml up -d \
              --pull never \
              --no-build \
              --remove-orphans

            # Clean up old images
            docker image prune -f --filter "until=24h"

            echo "==> Done."
