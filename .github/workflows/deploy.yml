name: Deploy

on:
  push:
    branches:
      - main
    # Does NOT trigger on develop - only production deployments from main

concurrency:
  # Only one deployment at a time; do not cancel in-progress deploys
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_APP: ghcr.io/${{ github.repository_owner }}/harmony-app
  IMAGE_MEDIA: ghcr.io/${{ github.repository_owner }}/harmony-media

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Setup Bun ──────────────────────────────────────────────────────────
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            shared/node_modules
            backend/node_modules
            frontend/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lockb', '**/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ── Lint (gate before building Docker images) ──────────────────────────
      - name: Run linters
        run: bun run lint

      # ── Docker Setup ───────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # ── Derive image tags ──────────────────────────────────────────────────
      - name: Generate image metadata
        id: meta
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "app_tag=${{ env.IMAGE_APP }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "media_tag=${{ env.IMAGE_MEDIA }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      # ── Build & Push App Image ─────────────────────────────────────────────
      - name: Build and push harmony-app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/app/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_APP }}:latest
            ${{ steps.meta.outputs.app_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

      # ── Build & Push Media Image ───────────────────────────────────────────
      - name: Build and push harmony-media image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/media/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_MEDIA }}:latest
            ${{ steps.meta.outputs.media_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}

      # ── Deploy to Production Server ────────────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            APP_TAG="${{ steps.meta.outputs.short_sha }}"
            REGISTRY="${{ env.REGISTRY }}"
            IMAGE_APP="${{ env.IMAGE_APP }}"
            IMAGE_MEDIA="${{ env.IMAGE_MEDIA }}"

            echo "==> Deploying Harmony @ ${APP_TAG} to ${DEPLOY_PATH}"
            cd "${DEPLOY_PATH}"

            # Log in to GHCR on the server
            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login "${REGISTRY}" \
                -u "${{ github.actor }}" \
                --password-stdin

            # Pull the newly built images
            echo "==> Pulling images..."
            docker pull "${IMAGE_APP}:${APP_TAG}"
            docker pull "${IMAGE_MEDIA}:${APP_TAG}"

            # Pin compose to use the exact tagged images
            export APP_IMAGE="${IMAGE_APP}:${APP_TAG}"
            export MEDIA_IMAGE="${IMAGE_MEDIA}:${APP_TAG}"

            # Run database migrations before restarting the app
            echo "==> Running database migrations..."
            docker compose -f docker/docker-compose.yml run --rm \
              -e DATABASE_URL \
              harmony-app \
              bun --filter @harmony/backend prisma migrate deploy

            # Restart services with zero-downtime rolling update
            echo "==> Restarting services..."
            docker compose -f docker/docker-compose.yml up -d \
              --pull never \
              --no-build \
              --remove-orphans

            # Remove dangling images to free disk space
            echo "==> Pruning old images..."
            docker image prune -f --filter "until=24h"

            echo "==> Deployment complete."
