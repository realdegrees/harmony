name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  # Cancel in-progress runs for the same branch/PR to save resources
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lint ───────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            shared/node_modules
            backend/node_modules
            frontend/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lockb', '**/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linters
        run: bun run lint

  # ── Job 2: Build ──────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            shared/node_modules
            backend/node_modules
            frontend/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lockb', '**/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared
        run: bun run build:shared

      - name: Build frontend
        run: bun run build:frontend

      - name: Build backend
        run: bun run build:backend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/app/Dockerfile
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/harmony-app:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build media Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/media/Dockerfile
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/harmony-media:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

